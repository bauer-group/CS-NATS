# =============================================================================
# Dependabot Configuration
# =============================================================================
# Watches:
#   1. GitHub Actions versions (workflows pinned to @main pull module updates)
#   2. Image references inside docker-compose*.yml files
#   3. Base images in the two src/ Dockerfiles
#   4. Python deps of the nats-init container
#
# Pure digest drift on existing tags is handled by check-base-images.yml
# (daily cron); this surfaces tag bumps and version updates as PRs.
# =============================================================================

version: 2
updates:
  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "sunday"
      time: "06:30"
      timezone: "Etc/UTC"
    labels:
      - "dependencies"
      - "github-actions"
      - "dependabot"
    commit-message:
      prefix: "chore(ci)"

  # Docker Compose images
  - package-ecosystem: "docker-compose"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "sunday"
      time: "06:30"
      timezone: "Etc/UTC"
    labels:
      - "dependencies"
      - "docker"
      - "dependabot"
    commit-message:
      prefix: "chore(deps)"

  # nats server base image (nats:*-alpine in src/nats/Dockerfile)
  - package-ecosystem: "docker"
    directory: "/src/nats"
    schedule:
      interval: "weekly"
      day: "sunday"
      time: "06:30"
      timezone: "Etc/UTC"
    labels:
      - "dependencies"
      - "docker"
      - "dependabot"
    commit-message:
      prefix: "chore(docker)"

  # nats-init base images (python:*-alpine + natsio/nats-box in src/nats-init/Dockerfile)
  - package-ecosystem: "docker"
    directory: "/src/nats-init"
    schedule:
      interval: "weekly"
      day: "sunday"
      time: "06:30"
      timezone: "Etc/UTC"
    labels:
      - "dependencies"
      - "docker"
      - "dependabot"
    commit-message:
      prefix: "chore(docker)"

  # nats-init Python deps (requirements.txt + requirements-test.txt)
  - package-ecosystem: "pip"
    directory: "/src/nats-init"
    schedule:
      interval: "weekly"
      day: "sunday"
      time: "06:30"
      timezone: "Etc/UTC"
    labels:
      - "dependencies"
      - "python"
      - "dependabot"
    commit-message:
      prefix: "chore(deps)"
