# =============================================================================
# NATS - Cluster Mode (Traefik Reverse Proxy)
# =============================================================================
# Usage: docker compose -f docker-compose.traefik.yml up -d
#
# Prerequisites:
#   - Traefik running on the external ${PROXY_NETWORK} network
#   - DNS: ${METRICS_HOSTNAME} -> this host (Prometheus exporter, HTTPS)
#   python scripts/generate-env.py && python scripts/generate-credentials.py
#
# NATS has no web UI. Traefik (HTTP-only) serves the prometheus-nats-exporter
# /metrics over HTTPS (Let's Encrypt) behind basic-auth — the exporter has no
# auth of its own. NATS client (4222) and routes (6222) are raw TCP and are
# published as host ports (Traefik does not proxy them).
#
# For real Let's Encrypt certs on the client TLS port (4222), enable the
# optional certs-dumper sidecar and set NATS_TLS_MODE=managed in .env:
#   docker compose -f docker-compose.traefik.yml --profile tls-letsencrypt up -d
#
# Access:
#   - Metrics     https://${METRICS_HOSTNAME}/metrics   (basic-auth)
#   - Client      nats://<this-host>:${PORT_CLIENT:-4222}  (also :4223 / :4224)
# =============================================================================


x-nats-env: &nats-env
  TZ: ${TIME_ZONE:-Etc/UTC}
  NATS_CLUSTER_NAME: ${NATS_CLUSTER_NAME:-bauergroup}
  NATS_ROUTE_USER: ${NATS_ROUTE_USER:-route}
  NATS_ROUTE_PASSWORD: ${NATS_ROUTE_PASSWORD:-route}
  NATS_JS_MAX_MEM: ${NATS_JS_MAX_MEM:-1G}
  NATS_JS_MAX_FILE: ${NATS_JS_MAX_FILE:-10G}
  NATS_MAX_PAYLOAD: ${NATS_MAX_PAYLOAD:-8MB}
  NATS_MAX_CONNECTIONS: ${NATS_MAX_CONNECTIONS:-65536}
  # Set NATS_TLS_MODE=managed in .env to consume the certs-dumper output.
  NATS_TLS_MODE: ${NATS_TLS_MODE:-selfsigned}
  NATS_TLS_VERIFY: ${NATS_TLS_VERIFY:-false}
  NATS_TLS_CN: ${NATS_CLIENT_HOSTNAME:-localhost}
  NATS_TLS_MANAGED_WAIT: ${NATS_TLS_MANAGED_WAIT:-30}
  NATS_OPERATOR_JWT: ${NATS_OPERATOR_JWT}
  NATS_SYS_ACCOUNT_ID: ${NATS_SYS_ACCOUNT_ID}
  NATS_SYS_ACCOUNT_JWT: ${NATS_SYS_ACCOUNT_JWT}
  NATS_APP_ACCOUNT_ID: ${NATS_APP_ACCOUNT_ID}
  NATS_APP_ACCOUNT_JWT: ${NATS_APP_ACCOUNT_JWT}

x-nats-common: &nats-common
  image: ${NATS_IMAGE:-ghcr.io/bauer-group/cs-nats/nats}:${NATS_IMAGE_VERSION:-latest}
  restart: unless-stopped
  logging:
    driver: json-file
    options:
      max-size: "50m"
      max-file: "3"
  healthcheck:
    test: ["CMD-SHELL", "wget -q -O - 'http://127.0.0.1:8222/healthz?js-enabled-only=true' >/dev/null 2>&1 || exit 1"]
    interval: 15s
    timeout: 5s
    retries: 5
    start_period: 30s
  networks:
    local:


services:
  nats-1:
    <<: *nats-common
    container_name: ${STACK_NAME:-nats}_NODE1
    hostname: nats-1
    environment:
      <<: *nats-env
      NATS_SERVER_NAME: nats-1
    ports:
      - "${PORT_CLIENT:-4222}:4222"
    volumes:
      - nats1-data:/data
      - nats-certs:/etc/nats/certs

  nats-2:
    <<: *nats-common
    container_name: ${STACK_NAME:-nats}_NODE2
    hostname: nats-2
    environment:
      <<: *nats-env
      NATS_SERVER_NAME: nats-2
    ports:
      - "${PORT_CLIENT_2:-4223}:4222"
    volumes:
      - nats2-data:/data
      - nats-certs:/etc/nats/certs

  nats-3:
    <<: *nats-common
    container_name: ${STACK_NAME:-nats}_NODE3
    hostname: nats-3
    environment:
      <<: *nats-env
      NATS_SERVER_NAME: nats-3
    ports:
      - "${PORT_CLIENT_3:-4224}:4222"
    volumes:
      - nats3-data:/data
      - nats-certs:/etc/nats/certs

  nats-box:
    image: ${NATS_BOX_IMAGE:-natsio/nats-box}:${NATS_BOX_VERSION:-latest}
    container_name: ${STACK_NAME:-nats}_BOX
    restart: unless-stopped
    entrypoint: ["sh", "-c", "trap : TERM INT; sleep infinity & wait"]
    environment:
      - NATS_URL=nats://nats-1:4222,nats://nats-2:4222,nats://nats-3:4222
      - NATS_CREDS=/creds/admin.creds
      - NATS_CA=/certs/ca.pem
    volumes:
      - ./creds:/creds:ro
      - nats-certs:/certs:ro
    depends_on:
      - nats-1
      - nats-2
      - nats-3
    networks:
      local:

  nats-init:
    image: ${NATS_INIT_IMAGE:-ghcr.io/bauer-group/cs-nats/nats-init}:${NATS_INIT_VERSION:-latest}
    container_name: ${STACK_NAME:-nats}_INIT
    restart: "no"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "1"
    environment:
      - TZ=${TIME_ZONE:-Etc/UTC}
      - NATS_URLS=nats://nats-1:4222,nats://nats-2:4222,nats://nats-3:4222
      - NATS_CREDS=/creds/admin.creds
      - NATS_TLS_CA=/certs/ca.pem
      - NATS_WAIT_TIMEOUT=${NATS_WAIT_TIMEOUT:-120}
      - APP_STREAM_NAME=${APP_STREAM_NAME:-app-events}
    volumes:
      - nats-config:/config
      - ./creds:/creds:ro
      - nats-certs:/certs:ro
    depends_on:
      nats-1:
        condition: service_started
    networks:
      local:

### Prometheus exporter — exposed via Traefik (HTTPS + basic-auth) ###
  nats-exporter:
    image: ${NATS_EXPORTER_IMAGE:-natsio/prometheus-nats-exporter}:${NATS_EXPORTER_VERSION:-latest}
    container_name: ${STACK_NAME:-nats}_EXPORTER
    restart: unless-stopped
    command:
      - "-port=7777"
      - "-varz"
      - "-jsz=all"
      - "-connz"
      - "-routez"
      - "-gatewayz"
      - "-leafz"
      - "-subz"
      - "http://nats-1:8222"
      - "http://nats-2:8222"
      - "http://nats-3:8222"
    expose:
      - 7777/tcp
    depends_on:
      - nats-1
      - nats-2
      - nats-3
    networks:
      local:
      proxy:
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${PROXY_NETWORK:-EDGEPROXY}"

      # ── HTTP -> HTTPS redirect ──────────────────────────────────────────
      - "traefik.http.routers.${STACK_NAME:-nats}-metrics-http.rule=Host(`${METRICS_HOSTNAME}`)"
      - "traefik.http.routers.${STACK_NAME:-nats}-metrics-http.entrypoints=web"
      - "traefik.http.routers.${STACK_NAME:-nats}-metrics-http.middlewares=${STACK_NAME:-nats}-redirect-to-secure"
      - "traefik.http.middlewares.${STACK_NAME:-nats}-redirect-to-secure.redirectscheme.scheme=https"
      - "traefik.http.middlewares.${STACK_NAME:-nats}-redirect-to-secure.redirectscheme.permanent=true"

      # ── Metrics — HTTPS + basic-auth (exporter has no auth of its own) ───
      - "traefik.http.routers.${STACK_NAME:-nats}-metrics.rule=Host(`${METRICS_HOSTNAME}`)"
      - "traefik.http.routers.${STACK_NAME:-nats}-metrics.entrypoints=web-secure"
      - "traefik.http.routers.${STACK_NAME:-nats}-metrics.tls=true"
      - "traefik.http.routers.${STACK_NAME:-nats}-metrics.tls.certresolver=letsencrypt"
      - "traefik.http.routers.${STACK_NAME:-nats}-metrics.service=${STACK_NAME:-nats}-metrics"
      - "traefik.http.routers.${STACK_NAME:-nats}-metrics.middlewares=${STACK_NAME:-nats}-metrics-auth"
      - "traefik.http.middlewares.${STACK_NAME:-nats}-metrics-auth.basicauth.users=${METRICS_BASICAUTH}"
      - "traefik.http.services.${STACK_NAME:-nats}-metrics.loadBalancer.server.port=7777"

### Certificate Dumper (optional — profile: tls-letsencrypt) ###
  # Extracts the Let's Encrypt cert/key Traefik obtained (from acme.json) into
  # the shared certs volume as cert.pem / key.pem, so NATS serves a real
  # CA-signed certificate on the client port (4222). Set NATS_TLS_MODE=managed.
  certs-dumper:
    image: ${CERTS_DUMPER_IMAGE:-ldez/traefik-certs-dumper}:${CERTS_DUMPER_VERSION:-latest}
    profiles: ["tls-letsencrypt"]
    container_name: ${STACK_NAME:-nats}_CERTS
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "1"
    command: >
      file
      --version v3
      --watch
      --source /traefik/acme.json
      --dest /output
      --crt-name cert --crt-ext .pem
      --key-name key --key-ext .pem
    volumes:
      - ${TRAEFIK_ACME_FILE:-./acme.json}:/traefik/acme.json:ro
      - nats-certs:/output
    networks:
      local:


### Volumes ###
volumes:
  nats1-data:
    driver: local
    name: ${STACK_NAME:-nats}-node1-data
  nats2-data:
    driver: local
    name: ${STACK_NAME:-nats}-node2-data
  nats3-data:
    driver: local
    name: ${STACK_NAME:-nats}-node3-data
  nats-certs:
    driver: local
    name: ${STACK_NAME:-nats}-certs
  nats-config:
    driver: local
    name: ${STACK_NAME:-nats}-config


### Networks ###
networks:
  local:
    driver: bridge
    name: ${STACK_NAME:-nats}
    enable_ipv6: true
  proxy:
    name: ${PROXY_NETWORK:-EDGEPROXY}
    external: true
